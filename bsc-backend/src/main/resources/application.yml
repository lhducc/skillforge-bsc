server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: bsc-skillforge-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/bsc_skillforge
    username: bsc_user
    password: bsc_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: debug